<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localiza Já</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌎 Localiza Já</h1>
      <p>Digite um CEP e descubra tudo sobre o local</p>
    </header>

    <div class="search-box">
      <input type="text" id="cepInput" placeholder="Digite o CEP (ex: 30130-010)" maxlength="9">
      <button id="buscarBtn">Buscar</button>
    </div>

    <div id="loading" class="hidden">Buscando informações...</div>

    <div id="resultado" class="hidden"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
